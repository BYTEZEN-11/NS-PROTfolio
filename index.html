<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>ns. — NITESH Singh · Full-Stack · Open Source</title>
  <meta name="description" content="NITESH Singh — full-stack developer building web, mobile, and AI projects. India." />
  <meta name="theme-color" content="#f4f5f2" />
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&f[]=general-sans@400,500,600,700&display=swap" />

</head>
<body>
  <a href="#home" class="skip-link">Skip to content</a>
  <div class="intro" id="intro" aria-hidden="true">
    <div class="intro__top">
      <span class="intro__brand" data-bind="profile.wordmark"></span>
      <span class="intro__caption" data-bind="profile.caption"></span>
      <span class="intro__ignition"><span class="dot"></span>IGNITION</span>
    </div>
    <div class="intro__dial" aria-hidden="true">
      <svg viewBox="0 0 220 220" class="intro__ring">
        <circle cx="110" cy="110" r="100" fill="none" stroke="currentColor" stroke-width="1" opacity="0.25"/>
        <circle cx="110" cy="110" r="80"  fill="none" stroke="currentColor" stroke-width="1" opacity="0.15"/>
      </svg>
      <svg viewBox="0 0 220 220" class="intro__sweep">
        <path d="M 110 30 A 80 80 0 1 1 36.5 156" fill="none" stroke="var(--amber)" stroke-width="3" stroke-linecap="round"/>
      </svg>
      <div class="intro__ticks">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
      </div>
      <div class="intro__lbl intro__lbl--km">KM·H</div>
      <div class="intro__lbl intro__lbl--rpm">RPM</div>
    </div>
    <div class="intro__bottom">
      <span class="intro__booting">BOOTING SYSTEM</span>
      <span class="intro__counter" id="introCounter">001</span>
    </div>
  </div>
  <header class="hdr" id="hdr">
    <div class="hdr__inner">
      <a href="#home" class="hdr__brand" data-bind="profile.wordmark"></a>
      <nav class="hdr__nav" aria-label="Primary">
        <ul class="hdr__list" id="navList"></ul>
      </nav>
      <span class="hdr__pill">
        <span class="dot dot--amber"></span>
        <span data-bind="profile.madeInIndia"></span>
      </span>
      <button class="hdr__menu" id="menuBtn" aria-expanded="false" aria-controls="mobileMenu" aria-label="Open menu">
        <span class="hdr__menu-line"></span>
        <span class="hdr__menu-line"></span>
      </button>
    </div>
    <div class="hdr__drawer" id="mobileMenu" hidden>
      <ul class="hdr__drawer-list" id="drawerList"></ul>
    </div>
  </header>
  <main>
    <section class="hero" id="home">
      <div class="hero__inner">
        <div class="hero__left">
          <div class="eyebrow eyebrow--bar">
            <span class="bar"></span>
            <span>— full-stack developer — open source contributor</span>
          </div>
          <h1 class="hero__h1 reveal-words" id="heroH1"></h1>
          <svg class="hero__underline" viewBox="0 0 600 24" aria-hidden="true">
            <path d="M2 14 C 120 4, 320 22, 598 8" fill="none" stroke="var(--ink)" stroke-width="2" stroke-linecap="round" />
          </svg>
          <p class="hero__bio" data-bind="profile.bio"></p>
          <div class="hero__meta">
            <span data-bind="profile.education"></span>
            <span class="hero__meta-sep">·</span>
            <span data-bind="profile.batch"></span>
          </div>
          <div class="hero__socials" id="heroSocials"></div>
          <div class="hero__ctas">
            <a href="#" class="btn btn--ink" data-magnetic>
              <span>RESUME</span>
              <span class="btn__arrow">↗</span>
            </a>
            <a href="#projects" class="btn btn--ghost" data-magnetic>
              <span>SEE THE WORK</span>
              <span class="btn__arrow btn__arrow--end">→</span>
            </a>
          </div>
          <div class="hero__stats" id="heroStats"></div>
        </div>
        <div class="hero__right">
          <div class="hero__portrait reveal" data-tilt>
            <div class="hero__portrait-bar">
              <span class="dot dot--red"></span>
              <span class="dot dot--amber2"></span>
              <span class="dot dot--green"></span>
              <span class="hero__portrait-title">nitesh@arch — me</span>
            </div>
            <div class="hero__portrait-body">
              <img class="hero__portrait-img"
                   src="https://i.ibb.co/Zpw42B0y/PHOTO-2.jpg"
                   alt="NITESH Singh"
                   loading="eager"
                   onerror="this.parentElement.classList.add('is-broken'); this.remove();" />
              <div class="hero__portrait-caption">
                <span class="hero__portrait-name">nitesh_singh</span>
                <span class="hero__portrait-role">full-stack developer · open-source contributor</span>
              </div>
            </div>
            <div class="hero__portrait-coral" aria-hidden="true"></div>
          </div>
        </div>
      </div>
      <div class="hero__scrollhint" aria-hidden="true">
        <span>scroll</span>
        <span class="hero__scrollhint-line"></span>
      </div>
